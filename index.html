<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop-Scraper | Enterprise Product Intelligence</title>
    
    <!-- Scripts & Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind Config for Custom Colors -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        emerald: { 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 900: '#064e3b' },
                        gold: { 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706', 700: '#b45309' },
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        body {
            @apply bg-slate-50 text-slate-800 transition-colors duration-500;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .dark body {
            @apply bg-[#020617] text-slate-200;
        }

        /* Sophisticated Mesh Gradient */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 30%, rgba(16, 185, 129, 0.12) 0%, rgba(255, 255, 255, 1) 60%);
            transition: all 0.5s ease;
        }

        .dark .mesh-bg {
            background: 
                radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(217, 119, 6, 0.06) 0%, transparent 50%);
        }

        /* Refined Glassmorphism */
        .glass {
            @apply bg-white/80 border border-slate-200 shadow-sm backdrop-blur-xl transition-all duration-500;
        }

        .dark .glass {
            @apply bg-[#0f172a]/70 border-slate-800 shadow-[0_8px_32px_rgba(0,0,0,0.4)];
        }

        .glass-panel {
            @apply bg-white/90 border border-slate-200 shadow-sm backdrop-blur-xl;
        }

        .dark .glass-panel {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.8) 0%, rgba(2, 6, 23, 0.9) 100%);
            @apply border border-slate-800;
        }

        .glass-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-hover:hover {
            @apply border-emerald-500/30 dark:border-emerald-500/40 shadow-xl dark:shadow-[0_20px_50px_rgba(16,185,129,0.2)];
            transform: translateY(-5px) scale(1.01);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { @apply bg-slate-300 dark:bg-slate-700 rounded-full; }
        ::-webkit-scrollbar-thumb:hover { @apply bg-emerald-500 dark:bg-emerald-600; }

        /* Utilities */
        .text-gradient {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .dark .text-gradient {
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .text-gradient-gold {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .dark .text-gradient-gold {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glow-emerald {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }
        .dark .glow-emerald {
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.15);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; opacity: 0; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .animate-scan {
            position: relative; overflow: hidden;
        }
        .animate-scan::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(16, 185, 129, 0.1), transparent);
            animation: scan 2s infinite;
        }

        /* Chart Tooltip */
        .chartjs-tooltip {
            @apply bg-white/95 dark:bg-[#0f172a]/95 backdrop-blur-md border border-slate-200 dark:border-slate-700 rounded-lg shadow-xl;
            color: inherit !important;
        }
        .dark .chartjs-tooltip {
            color: #fff !important;
        }
        
        input[type="text"], input[type="email"], textarea {
            @apply bg-white border-slate-200 text-slate-900 transition-all duration-300;
        }
        .dark input[type="text"], .dark input[type="email"], .dark textarea {
            @apply bg-black/20 border-slate-800 text-white;
        }
        input:focus, textarea:focus {
            @apply border-emerald-500 ring-2 ring-emerald-500/20 outline-none;
        }

        .mobile-nav-enter { transform: translateY(-10px); opacity: 0; }
        .mobile-nav-enter-active { transform: translateY(0); opacity: 1; transition: all 0.3s ease; }

    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // --- Core UI Components ---

        const LucideIcon = ({ name, size = 20, className = "", strokeWidth }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                    const svg = iconRef.current.querySelector('svg');
                    if (svg) {
                        svg.style.width = size + 'px';
                        svg.style.height = size + 'px';
                        if (strokeWidth) svg.setAttribute('stroke-width', strokeWidth);
                        if (className) {
                            className.split(' ').forEach(c => {
                                if (c) svg.classList.add(c);
                            });
                        }
                    }
                }
            }, [name, size, className, strokeWidth]);
            return <span ref={iconRef} className="inline-flex items-center justify-center align-middle" style={{ width: size, height: size, flexShrink: 0 }}></span>;
        };

        const Card = ({ children, title, icon, className = "", noHover = false, titleColor="text-slate-900 dark:text-white" }) => (
            <div className={`glass rounded-[2rem] p-8 ${noHover ? '' : 'glass-hover'} ${className}`}>
                {(title || icon) && (
                    <div className="flex items-center gap-4 mb-6 border-b border-slate-100 dark:border-slate-800/50 pb-5">
                        {icon && <div className="p-3 bg-emerald-100/50 dark:bg-emerald-500/10 rounded-2xl text-emerald-600 dark:text-emerald-400 shadow-inner">{icon}</div>}
                        <h3 className={`text-xl font-bold font-heading tracking-tight ${titleColor}`}>{title}</h3>
                    </div>
                )}
                {children}
            </div>
        );


        const Button = ({ children, onClick, variant = 'primary', className = "", disabled = false }) => {
            const baseStyle = "font-medium px-6 py-2.5 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 outline-none";
            const variants = {
                primary: "bg-emerald-600 hover:bg-emerald-500 text-white shadow-lg shadow-emerald-600/20 disabled:opacity-50",
                gold: "bg-gold-500 hover:bg-gold-400 text-white shadow-lg shadow-gold-500/20 disabled:opacity-50",
                outline: "bg-white dark:bg-transparent border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 hover:border-emerald-500 hover:text-emerald-600 dark:hover:text-emerald-400 disabled:opacity-50",
                ghost: "bg-transparent hover:bg-slate-100 dark:hover:bg-white/5 text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white disabled:opacity-50"
            };
            return (
                <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        const Skeleton = ({ className }) => (
            <div className={`animate-pulse bg-slate-200 dark:bg-slate-800 rounded-lg ${className}`}></div>
        );

        // --- Simulated Checkout Modal ---
        const CheckoutModal = ({ tier, onClose, onComplete }) => {
            const [loading, setLoading] = useState(false);
            const [success, setSuccess] = useState(false);
            const [payMethod, setPayMethod] = useState('card');
            const [mobileProvider, setMobileProvider] = useState('JazzCash');
            const [cryptoCoin, setCryptoCoin] = useState('BTC');

            const handlePay = () => {
                setLoading(true);
                setTimeout(() => {
                    setLoading(false);
                    setSuccess(true);
                    setTimeout(() => onComplete(), 2500);
                }, 1500);
            };

            if (!tier) return null;

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-2 bg-black/60 backdrop-blur-sm fade-in">
                    <div className="bg-white dark:bg-slate-900 rounded-xl w-full max-w-[320px] shadow-2xl border border-slate-200 dark:border-slate-800 flex flex-col max-h-[95vh]">
                        {/* Static Header */}
                        <div className="p-3 bg-gradient-to-r from-emerald-600 to-emerald-500 flex justify-between items-center shrink-0 rounded-t-xl">
                            <div>
                                <h3 className="font-black text-base text-white font-heading tracking-tight flex items-center gap-2">
                                    <LucideIcon name="lock" size={14} className="text-white/80"/> Secure Checkout
                                </h3>
                                <p className="text-emerald-100 text-[10px] mt-0.5 font-medium uppercase tracking-widest">{tier.name} • {tier.price}{tier.price !== '$0' ? '/mo' : ''}</p>
                            </div>
                            <button onClick={onClose} className="bg-white/20 hover:bg-white/30 text-white rounded-full p-1.5 transition-all hover:rotate-90">
                                <LucideIcon name="x" size={14}/>
                            </button>
                        </div>

                        <div className="flex items-center justify-center gap-4 py-2 bg-slate-50 dark:bg-slate-950 border-b border-slate-200 dark:border-slate-800 shrink-0">
                            {['Visa','MC','PayPal','Stripe','AMEX'].map(b => (
                                <span key={b} className="text-[8px] font-black text-slate-400 dark:text-slate-600 uppercase tracking-widest">{b}</span>
                            ))}
                        </div>

                        {/* Scrollable Body */}
                        <div className="p-3 overflow-y-auto flex-grow custom-scrollbar">
                            {success ? (
                                <div className="text-center py-6 fade-in">
                                    <div className="w-16 h-16 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 mx-auto rounded-full flex items-center justify-center mb-4 shadow-[0_0_30px_rgba(16,185,129,0.3)]">
                                        <LucideIcon name="check" size={32}/>
                                    </div>
                                    <h4 className="text-xl font-black text-slate-900 dark:text-white mb-2 font-heading">Payment Successful!</h4>
                                    <p className="text-slate-500 text-sm">Welcome to Shop-Scraper.<br/>Redirecting to dashboard...</p>
                                </div>
                            ) : (
                                <div className="space-y-4 fade-in">
                                    <div>
                                        <div className="grid grid-cols-2 gap-2">
                                            {[{id:'card',label:'Card',icon:'credit-card'},{id:'paypal',label:'PayPal',icon:'globe'},{id:'crypto',label:'Crypto',icon:'zap'},{id:'mobile',label:'Mobile',icon:'smartphone'}].map(m => (
                                                <button key={m.id} onClick={() => setPayMethod(m.id)}
                                                    className={`flex items-center justify-center gap-1.5 py-2 px-2 rounded-lg border-2 transition-all text-xs font-bold ${payMethod === m.id ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-500/10 text-emerald-700 dark:text-emerald-400' : 'border-slate-200 dark:border-slate-700 text-slate-500 hover:border-slate-300 dark:hover:border-slate-600'}`}>
                                                    <LucideIcon name={m.icon} size={14}/>{m.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="flex items-center bg-white dark:bg-black/20 border border-slate-200 dark:border-slate-700 rounded-lg px-2.5 focus-within:border-emerald-500 transition-all">
                                        <LucideIcon name="mail" size={14} className="text-slate-400"/>
                                        <input type="email" placeholder="you@company.com" className="w-full bg-transparent border-none outline-none focus:ring-0 px-2 py-2 text-xs"/>
                                    </div>

                                    {payMethod === 'card' && (
                                        <div className="space-y-2 fade-in">
                                            <div className="flex items-center bg-white dark:bg-black/20 border border-slate-200 dark:border-slate-700 rounded-lg px-2.5 focus-within:border-emerald-500 transition-all">
                                                <LucideIcon name="credit-card" size={14} className="text-slate-400"/>
                                                <input type="text" placeholder="1234 5678 9012 3456" className="w-full bg-transparent border-none outline-none focus:ring-0 px-2 py-2 text-xs font-mono"/>
                                            </div>
                                            <div className="grid grid-cols-2 gap-2">
                                                <div className="flex items-center bg-white dark:bg-black/20 border border-slate-200 dark:border-slate-700 rounded-lg px-2.5 focus-within:border-emerald-500 transition-all">
                                                    <LucideIcon name="calendar" size={14} className="text-slate-400"/>
                                                    <input type="text" placeholder="MM/YY" className="w-full bg-transparent border-none outline-none focus:ring-0 px-2 py-2 text-xs font-mono"/>
                                                </div>
                                                <div className="flex items-center bg-white dark:bg-black/20 border border-slate-200 dark:border-slate-700 rounded-lg px-2.5 focus-within:border-emerald-500 transition-all">
                                                    <LucideIcon name="shield" size={14} className="text-slate-400"/>
                                                    <input type="text" placeholder="CVC" className="w-full bg-transparent border-none outline-none focus:ring-0 px-2 py-2 text-xs font-mono"/>
                                                </div>
                                            </div>
                                            <div className="flex items-center bg-white dark:bg-black/20 border border-slate-200 dark:border-slate-700 rounded-lg px-2.5 focus-within:border-emerald-500 transition-all">
                                                <LucideIcon name="user" size={14} className="text-slate-400"/>
                                                <input type="text" placeholder="Cardholder Name" className="w-full bg-transparent border-none outline-none focus:ring-0 px-2 py-2 text-xs"/>
                                            </div>
                                        </div>
                                    )}

                                    {payMethod === 'paypal' && (
                                        <div className="fade-in text-center py-4 bg-[#003087]/5 dark:bg-[#003087]/10 border-2 border-dashed border-[#003087]/20 rounded-xl space-y-2">
                                            <div className="w-12 h-12 bg-[#003087] rounded-xl flex items-center justify-center mx-auto shadow-lg shadow-[#003087]/30">
                                                <LucideIcon name="globe" size={24} className="text-white"/>
                                            </div>
                                            <h4 className="font-black text-slate-900 dark:text-white text-sm">PayPal</h4>
                                            <p className="text-xs text-slate-500 px-2">You'll be securely redirected to PayPal.</p>
                                        </div>
                                    )}

                                    {payMethod === 'crypto' && (
                                        <div className="fade-in space-y-2">
                                            <div className="grid grid-cols-3 gap-2">
                                                {[{name:'Bitcoin',sym:'BTC',color:'#F7931A'},{name:'Ethereum',sym:'ETH',color:'#627EEA'},{name:'USDT',sym:'USDT',color:'#26A17B'}].map(c => (
                                                    <button key={c.sym} onClick={() => setCryptoCoin(c.sym)} className={`flex flex-col items-center gap-0.5 py-2 rounded-lg border-2 transition-all text-[10px] font-bold ${cryptoCoin === c.sym ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-500/10' : 'border-slate-200 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-600 text-slate-700 dark:text-slate-300'}`}>
                                                        <span className="text-base font-black" style={{color:c.color}}>{c.sym}</span>{c.name}
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="flex items-center bg-white dark:bg-black/20 border border-slate-200 dark:border-slate-700 rounded-lg px-2.5 focus-within:border-emerald-500 transition-all">
                                                <LucideIcon name="wallet" size={14} className="text-slate-400"/>
                                                <input type="text" placeholder="Your wallet address" className="w-full bg-transparent border-none outline-none focus:ring-0 px-2 py-2 text-xs font-mono"/>
                                            </div>
                                        </div>
                                    )}

                                    {payMethod === 'mobile' && (
                                        <div className="fade-in space-y-2">
                                            <div className="grid grid-cols-2 gap-2">
                                                {['JazzCash','EasyPaisa','M-Pesa','bKash'].map(p => (
                                                    <button key={p} onClick={() => setMobileProvider(p)}
                                                        className={`py-2 rounded-lg border-2 transition-all text-xs font-bold ${mobileProvider === p ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-500/10 text-emerald-700 dark:text-emerald-400' : 'border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:border-slate-300 dark:hover:border-slate-600'}`}>
                                                        {p}
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="flex items-center bg-white dark:bg-black/20 border border-slate-200 dark:border-slate-700 rounded-lg px-2.5 focus-within:border-emerald-500 transition-all">
                                                <LucideIcon name="phone" size={14} className="text-slate-400"/>
                                                <input type="text" placeholder={`${mobileProvider} number`} className="w-full bg-transparent border-none outline-none focus:ring-0 px-2 py-2 text-xs"/>
                                            </div>
                                        </div>
                                    )}

                                    <button onClick={handlePay} disabled={loading}
                                        className={`w-full py-2.5 rounded-xl font-black text-white text-base transition-all hover:scale-[1.02] active:scale-[0.98] shadow-lg flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-600 to-emerald-500 shadow-emerald-500/30 disabled:opacity-60`}>
                                        {loading ? <LucideIcon name="loader-2" className="animate-spin" size={18}/> : <LucideIcon name="lock" size={18}/>}
                                        {loading ? 'Processing...' : `Pay ${tier.price}`}
                                    </button>

                                    <div className="flex items-center justify-center gap-4 pt-1">
                                        {[{icon:'shield-check',label:'SSL'},{icon:'lock',label:'PCI DSS'}].map(t => (
                                            <div key={t.label} className="flex items-center gap-1 text-[9px] text-slate-400 font-medium">
                                                <LucideIcon name={t.icon} size={10} className="text-emerald-500"/>{t.label}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Marketing & Content Sections ---

        const Navbar = ({ currentRoute, setCurrentRoute, theme, toggleTheme, user, onLogout }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navItems = [
                { id: 'home', label: 'Platform' },
                { id: 'about', label: 'About Us' },
                { id: 'pricing', label: 'Pricing' },
                { id: 'reviews', label: 'Reviews' },
                { id: 'contact', label: 'Contact' }
            ];

            const navBg = scrolled 
                ? 'bg-white/95 dark:bg-[#020617]/95 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800 shadow-sm' 
                : 'bg-transparent border-b border-transparent';

            return (
                <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${navBg}`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex items-center justify-between h-20">
                            <div className="flex-shrink-0 flex items-center gap-2 cursor-pointer" onClick={() => setCurrentRoute('home')}>
                                <div className="bg-emerald-100 dark:bg-emerald-500/20 p-2 rounded-xl text-emerald-600 dark:text-emerald-400">
                                    <LucideIcon name="shopping-bag" size={24} />
                                </div>
                                <span className="font-heading font-extrabold text-2xl text-slate-900 dark:text-white tracking-tight">Shop<span className="text-emerald-600 dark:text-emerald-500">-Scraper</span></span>
                            </div>
                            
                            <div className="hidden md:flex items-center">
                                <div className="ml-10 flex items-baseline space-x-1">
                                    {navItems.map(item => (
                                        <button 
                                            key={item.id}
                                            onClick={() => setCurrentRoute(item.id)}
                                            className={`px-4 py-2 rounded-lg text-sm font-semibold transition-colors ${currentRoute === item.id ? 'text-emerald-700 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-500/10' : 'text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-white/5'}`}
                                        >
                                            {item.label}
                                        </button>
                                    ))}
                                    <div className="h-6 w-px bg-slate-300 dark:bg-slate-700 mx-2"></div>
                                    {user ? (
                                        <div className="flex items-center gap-4 ml-2 mr-2">
                                            <div className="flex items-center gap-2 bg-slate-100 dark:bg-white/5 px-3 py-1.5 rounded-full border border-slate-200 dark:border-white/10">
                                                <div className="w-7 h-7 rounded-full bg-emerald-500 text-white flex items-center justify-center text-xs font-bold uppercase">
                                                    {user.name ? user.name.charAt(0) : 'U'}
                                                </div>
                                                <span className="text-sm font-bold text-slate-700 dark:text-slate-300 max-w-[100px] truncate">{user.name || user.email}</span>
                                            </div>
                                            <button onClick={onLogout} className="text-slate-500 hover:text-red-500 dark:text-slate-400 dark:hover:text-red-400 transition-colors" title="Log Out">
                                                <LucideIcon name="log-out" size={18} />
                                            </button>
                                        </div>
                                    ) : (
                                        <button onClick={() => setCurrentRoute('login')} className="px-5 py-2 bg-emerald-600 text-white rounded-lg text-sm font-bold hover:bg-emerald-500 transition-all shadow-md shadow-emerald-600/20 mr-2">Login</button>
                                    )}
                                    <button onClick={toggleTheme} className="p-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-white/5 transition-colors">
                                        <LucideIcon name={theme === 'dark' ? 'sun' : 'moon'} size={20} />
                                    </button>
                                </div>
                            </div>

        const ScraperTool = ({ theme }) => {
            const [url, setUrl] = useState("");
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(null);
            const [error, setError] = useState(null);
            const [audit, setAudit] = useState(null);
            const [trustScore, setTrustScore] = useState(null);
            const [view, setView] = useState("dashboard"); 
            const [chartMode, setChartMode] = useState("distribution"); 

            // Inventory Smart Table State
            const [searchTerm, setSearchTerm] = useState("");
            const [sortConfig, setSortConfig] = useState({ key: 'price', direction: 'desc' });
            const [currentPage, setCurrentPage] = useState(1);
            const itemsPerPage = 15;

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const handleScrape = async () => {
                if (!url) return;
                setLoading(true); setError(null); setData(null); setAudit(null); setTrustScore(null);
                setSearchTerm(""); setCurrentPage(1);

                try {
                    let targetUrl = url.trim();
                    if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;
                    const urlObj = new URL(targetUrl);
                    const productsUrl = `${urlObj.origin}${urlObj.pathname.replace(/\/$/, '')}/products.json?limit=250`;

                    // Simulated extraction delay for UX
                    await new Promise(r => setTimeout(r, 1500));

                    const response = await fetch(productsUrl);
                    if (!response.ok) throw new Error("Could not access data. The store might have blocked public access or the URL is invalid.");
                    const json = await response.json();

                    if (!json.products || json.products.length === 0) throw new Error("No products found at this store.");

                    setData({ products: json.products, shopUrl: urlObj.origin, fetchedAt: new Date().toLocaleString() });
                    generateMockAudit(json.products);
                    generateTrustScore(json.products);
                    setView("dashboard");
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const generateMockAudit = (products) => {
                const avgPrice = products.reduce((acc, p) => acc + parseFloat(p.variants[0].price), 0) / products.length;
                setAudit({
                    niche: products[0].product_type || "General Retail",
                    priceStrategy: avgPrice > 100 ? "Premium/High-Ticket" : "Competitive/Volume",
                    targetAudience: "Niche specific enthusiasts seeking quality.",
                    score: Math.floor(Math.random() * (98 - 75 + 1)) + 75,
                    suggestions: [
                        "Optimize product image ALT tags to capture long-tail search traffic.",
                        `Average pricing ($${avgPrice.toFixed(0)}) indicates room for premium bundling.`,
                        "Consider reducing variant complexity on top-performing SKUs."
                    ]
                });
            };

            const generateTrustScore = (products) => {
                let score = 100;
                const vendors = new Set(products.map(p => p.vendor));
                if (vendors.size > 15) score -= 25; 
                
                const hasDefaultTitle = products.some(p => p.variants.some(v => v.title.toLowerCase() === 'default title'));
                if (hasDefaultTitle) score -= 15; 

                const hasEmptyTags = products.some(p => !p.tags || p.tags.length === 0);
                if(hasEmptyTags) score -= 10;

                score -= Math.floor(Math.random() * 10); 

                setTrustScore({
                    score: Math.max(10, score),
                    metrics: [
                        { label: "Vendor Consolidation", passed: vendors.size < 5, desc: "High vendor count suggests unvetted dropshipping." },
                        { label: "Variant Hygiene", passed: !hasDefaultTitle, desc: "Presence of 'Default Title' variants indicates rushed cataloging." },
                        { label: "Metadata Enrichment", passed: !hasEmptyTags, desc: "Lack of product tags hurts SEO and internal search." }
                    ]
                });
            };

            // Smart Table Logic
            const filteredAndSortedProducts = useMemo(() => {
                if (!data) return [];
                let p = [...data.products];

                if (searchTerm) {
                    const lower = searchTerm.toLowerCase();
                    p = p.filter(item => 
                        item.title.toLowerCase().includes(lower) || 
                        (item.vendor && item.vendor.toLowerCase().includes(lower)) ||
                        (item.product_type && item.product_type.toLowerCase().includes(lower))
                    );
                }

                if (sortConfig.key) {
                    p.sort((a, b) => {
                        if (sortConfig.key === 'price') {
                            const valA = parseFloat(a.variants[0].price);
                            const valB = parseFloat(b.variants[0].price);
                            return sortConfig.direction === 'asc' ? valA - valB : valB - valA;
                        } else {
                            const valA = (sortConfig.key === 'type' ? a.product_type : a[sortConfig.key]) || '';
                            const valB = (sortConfig.key === 'type' ? b.product_type : b[sortConfig.key]) || '';
                            return sortConfig.direction === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                        }
                    });
                }
                return p;
            }, [data, searchTerm, sortConfig]);

            const paginatedProducts = useMemo(() => {
                const start = (currentPage - 1) * itemsPerPage;
                return filteredAndSortedProducts.slice(start, start + itemsPerPage);
            }, [filteredAndSortedProducts, currentPage]);

            const totalPages = Math.ceil(filteredAndSortedProducts.length / itemsPerPage);

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
                setCurrentPage(1);
            };

            const SortIcon = ({ column }) => {
                if (sortConfig.key !== column) return <LucideIcon name="arrow-up-down" size={12} className="opacity-30 inline ml-1" />;
                return sortConfig.direction === 'asc' 
                    ? <LucideIcon name="chevron-up" size={14} className="inline ml-1 text-emerald-600 dark:text-emerald-400" />
                    : <LucideIcon name="chevron-down" size={14} className="inline ml-1 text-emerald-600 dark:text-emerald-400" />;
            };

            const exportCSV = () => {
                if (!data) return;
                const csvData = data.products.map(p => ({
                    Title: p.title, Price: p.variants[0].price, Vendor: p.vendor, Type: p.product_type, Link: `${data.shopUrl}/products/${p.handle}`
                }));
                const csv = Papa.unparse(csvData);
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `shopscraper_${new Date().getTime()}.csv`;
                link.click();
            };

            const exportExcel = () => {
                if (!data || !window.XLSX) return;
                const excelData = data.products.map(p => ({
                    Title: p.title, Price: parseFloat(p.variants[0].price), Vendor: p.vendor, Type: p.product_type, Link: `${data.shopUrl}/products/${p.handle}`
                }));
                const worksheet = XLSX.utils.json_to_sheet(excelData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Inventory Data");
                XLSX.writeFile(workbook, `shopscraper_${new Date().getTime()}.xlsx`);
            };

            const stats = useMemo(() => {
                if (!data) return null;
                const prices = data.products.map(p => parseFloat(p.variants[0].price));
                return {
                    total: data.products.length,
                    avg: (prices.reduce((a, b) => a + b, 0) / prices.length).toFixed(2),
                    min: Math.min(...prices).toFixed(2),
                    max: Math.max(...prices).toFixed(2)
                };
            }, [data]);

            // Chart Logic
            useEffect(() => {
                if (data && view === 'dashboard' && chartRef.current) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    
                    const ctx = chartRef.current.getContext('2d');
                    const isDark = theme === 'dark';
                    const textColor = isDark ? '#94a3b8' : '#475569';
                    const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';

                    if (chartMode === 'distribution') {
                        const priceRanges = { "0-25": 0, "25-50": 0, "50-100": 0, "100-250": 0, "250+": 0 };
                        data.products.forEach(p => {
                            const price = parseFloat(p.variants[0].price);
                            if (price < 25) priceRanges["0-25"]++;
                            else if (price < 50) priceRanges["25-50"]++;
                            else if (price < 100) priceRanges["50-100"]++;
                            else if (price < 250) priceRanges["100-250"]++;
                            else priceRanges["250+"]++;
                        });

                        const gradient = ctx.createLinearGradient(0, 0, 0, 300);
                        gradient.addColorStop(0, 'rgba(16, 185, 129, 0.8)'); 
                        gradient.addColorStop(1, 'rgba(16, 185, 129, 0.1)');

                        chartInstance.current = new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: Object.keys(priceRanges),
                                datasets: [{
                                    label: 'Products', data: Object.values(priceRanges),
                                    backgroundColor: gradient, borderColor: '#10b981', borderWidth: 1, borderRadius: 6,
                                }]
                            },
                            options: {
                                responsive: true, maintainAspectRatio: false,
                                plugins: { legend: { display: false } },
                                scales: { y: { grid: { color: gridColor }, ticks: { color: textColor } }, x: { grid: { display: false }, ticks: { color: textColor } } }
                            }
                        });
                    } else {
                        const labels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun (Proj)'];
                        const avg = parseFloat(stats.avg);
                        const trendData = [avg*0.9, avg*0.95, avg, avg*1.02, avg*1.08, avg*1.15]; 
                        
                        const gradient = ctx.createLinearGradient(0, 0, 0, 300);
                        gradient.addColorStop(0, 'rgba(217, 119, 6, 0.4)'); 
                        gradient.addColorStop(1, 'rgba(217, 119, 6, 0.0)');

                        chartInstance.current = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: labels,
                                datasets: [{
                                    label: 'Projected Avg Price', data: trendData,
                                    backgroundColor: gradient, borderColor: '#d97706', borderWidth: 3, fill: true, tension: 0.4,

                                }]

                            options: {
                                responsive: true, maintainAspectRatio: false,

                                scales: { y: { grid: { color: gridColor }, ticks: { color: textColor } }, x: { grid: { display: false }, ticks: { color: textColor } } }
                            }
                        });
                    }
                    
                    return () => {
                        if (chartInstance.current) {
                            chartInstance.current.destroy();
                            chartInstance.current = null;
                        }
                    };
                }

                                            </div>
                                        </div>

                                        <h4 className="font-bold text-slate-900 dark:text-white mb-6 uppercase tracking-wider text-sm">Security Metrics Breakdown</h4>
                                        <div className="space-y-4">
                                            {trustScore.metrics.map((m, i) => (
                                                <div key={i} className="flex items-start gap-5 p-5 rounded-2xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-white/5 hover:border-emerald-500/30 transition-colors">
                                                    <div className={`mt-0.5 ${m.passed ? 'text-emerald-500' : 'text-gold-500'}`}>
                                                        <LucideIcon name={m.passed ? 'check-circle-2' : 'alert-circle'} size={24} />
                                                    </div>
                                                    <div>
                                                        <h5 className="font-bold text-slate-900 dark:text-white text-base mb-1">{m.label}</h5>
                                                        <p className="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">{m.desc}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </Card>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const LoginPage = ({ onAuth }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!email || !password) return;
                onAuth({ name: isLogin ? (email.split('@')[0] || 'User') : name, email });
            };

            return (
                <div className="min-h-[100vh] flex items-center justify-center px-4 py-12 relative overflow-hidden">
                    <div className="w-full max-w-md glass-panel p-10 rounded-[2rem] shadow-2xl relative z-10 overflow-hidden border border-slate-200 dark:border-slate-800">
                        <div className="absolute -top-12 -right-12 w-40 h-40 bg-emerald-500/20 blur-3xl rounded-full"></div>
                        <div className="absolute -bottom-12 -left-12 w-40 h-40 bg-emerald-500/10 blur-3xl rounded-full"></div>
                        
                        <div className="text-center mb-10 relative z-10">
                            <div className="bg-emerald-100 dark:bg-emerald-500/20 p-4 rounded-2xl text-emerald-600 dark:text-emerald-400 w-fit mx-auto mb-5 shadow-inner">
                                <LucideIcon name="lock" size={32} />
                            </div>
                            <h2 className="text-3xl font-extrabold font-heading text-slate-900 dark:text-white mb-2 tracking-tight">
                                {isLogin ? 'Welcome Back' : 'Create Account'}
                            </h2>
                            <p className="text-slate-500 dark:text-slate-400 font-medium">
                                {isLogin ? 'Sign in to access your dashboard' : 'Join the enterprise platform'}
                            </p>
                        </div>

                        <form className="space-y-5 relative z-10" onSubmit={handleSubmit}>
                            {!isLogin && (
                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest ml-1">Full Name</label>
                                    <div className="relative">
                                        <LucideIcon name="user" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                        <input type="text" value={name} onChange={e=>setName(e.target.value)} required placeholder="John Doe" className="w-full pl-12 pr-5 py-3.5 rounded-xl bg-white dark:bg-black/20 border-slate-200 dark:border-slate-800 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition-all font-medium text-sm text-slate-900 dark:text-white" />
                                    </div>
                                </div>
                            )}
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest ml-1">Work Email</label>
                                <div className="relative">
                                    <LucideIcon name="mail" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input type="email" value={email} onChange={e=>setEmail(e.target.value)} required placeholder="name@company.com" className="w-full pl-12 pr-5 py-3.5 rounded-xl bg-white dark:bg-black/20 border-slate-200 dark:border-slate-800 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition-all font-medium text-sm text-slate-900 dark:text-white" />
                                </div>
                            </div>
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest ml-1">Password</label>
                                <div className="relative">
                                    <LucideIcon name="key" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input type="password" value={password} onChange={e=>setPassword(e.target.value)} required placeholder="••••••••" className="w-full pl-12 pr-5 py-3.5 rounded-xl bg-white dark:bg-black/20 border-slate-200 dark:border-slate-800 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition-all font-medium text-sm text-slate-900 dark:text-white" />
                                </div>
                            </div>
                            
                            {isLogin && (
                                <div className="flex items-center justify-between text-xs font-bold px-1">
                                    <label className="flex items-center gap-2 cursor-pointer text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300 transition-colors">
                                        <input type="checkbox" className="rounded border-slate-300 dark:border-slate-700 text-emerald-600 focus:ring-emerald-500 bg-transparent" /> Remember me
                                    </label>
                                    <a href="#" className="text-emerald-600 dark:text-emerald-400 hover:text-emerald-500 transition-colors">Forgot password?</a>
                                </div>
                            )}

                            <Button variant="primary" className="w-full py-4 text-base font-extrabold shadow-xl shadow-emerald-500/20 mt-2">
                                {isLogin ? 'Sign In Securely' : 'Create Account'}
                            </Button>
                            
                            <p className="text-center text-sm text-slate-500 dark:text-slate-400 mt-6 font-medium">
                                {isLogin ? "Don't have an account?" : "Already have an account?"} {' '}
                                <button type="button" onClick={() => setIsLogin(!isLogin)} className="text-emerald-600 dark:text-emerald-400 font-bold hover:underline transition-all">
                                    {isLogin ? 'Create one now' : 'Sign in instead'}
                                </button>
                            </p>
                        </form>
                    </div>
                </div>
            );
        };

        const WhatsAppWidget = () => {
            const [showTooltip, setShowTooltip] = useState(false);
            
            useEffect(() => {
                const timer = setTimeout(() => setShowTooltip(true), 2000);
                const hideTimer = setTimeout(() => setShowTooltip(false), 6000);
                return () => { clearTimeout(timer); clearTimeout(hideTimer); };
            }, []);

            return (
                <div className="fixed bottom-6 right-6 z-50 flex items-end gap-2 group">
                    <div className={`transition-all duration-300 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl px-4 py-2.5 shadow-xl text-sm text-slate-700 dark:text-slate-300 font-medium whitespace-nowrap mr-1 mb-1 ${showTooltip ? 'opacity-100 translate-x-0' : 'opacity-0 translate-x-4 group-hover:opacity-100 group-hover:translate-x-0'}`}>
                        👋 Chat with Support
                    </div>
                    <a 
                        href="https://wa.me/923270093063" 
                        target="_blank" 
                        rel="noreferrer"
                        className="w-14 h-14 bg-[#25D366] hover:bg-[#22c55e] text-white rounded-full flex items-center justify-center shadow-2xl shadow-green-500/30 transition-all hover:scale-110 active:scale-95"
                        aria-label="WhatsApp Support"
                    >
                        <svg viewBox="0 0 24 24" className="w-7 h-7 fill-current" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                        </svg>
                    </a>
                </div>
            );
        };

        const Footer = ({ setCurrentRoute }) => (
            <footer className="border-t border-slate-200 dark:border-white/5 bg-slate-100 dark:bg-[#020617] mt-auto pt-10 pb-6 transition-colors duration-300">
                <div className="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-8 mb-10">
                    <div className="md:col-span-2">
                        <div className="flex items-center gap-2 mb-4 cursor-pointer" onClick={() => setCurrentRoute('home')}>
                            <div className="bg-emerald-100 dark:bg-emerald-500/20 p-2 rounded-xl text-emerald-600 dark:text-emerald-400">
                                <LucideIcon name="shopping-bag" size={24} />
                            </div>
                            <span className="font-heading font-extrabold text-2xl text-slate-900 dark:text-white">Shop<span className="text-emerald-600 dark:text-emerald-500">-Scraper</span></span>
                        </div>
                        <p className="text-slate-500 dark:text-slate-400 text-base max-w-sm leading-relaxed">Enterprise product intelligence platform. Extract, analyze, and dominate your e-commerce niche with our proprietary extraction engine.</p>
                    </div>
                    <div>
                        <h4 className="text-slate-900 dark:text-white font-bold mb-6 tracking-wider uppercase text-sm">Product</h4>
                        <ul className="space-y-3 text-base font-medium text-slate-500 dark:text-slate-400">
                            <li><button onClick={() => setCurrentRoute('home')} className="hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors">Platform</button></li>
                            <li><button onClick={() => setCurrentRoute('pricing')} className="hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors">Pricing</button></li>
                            <li><button onClick={() => setCurrentRoute('reviews')} className="hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors">Reviews</button></li>
                        </ul>
                    </div>
                    <div>
                        <h4 className="text-slate-900 dark:text-white font-bold mb-6 tracking-wider uppercase text-sm">Company</h4>
                        <ul className="space-y-3 text-base font-medium text-slate-500 dark:text-slate-400">
                            <li><button onClick={() => setCurrentRoute('about')} className="hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors">About Us</button></li>
                            <li><button onClick={() => setCurrentRoute('contact')} className="hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors">Contact</button></li>
                            <li><a href="https://wa.me/923270093063" target="_blank" rel="noreferrer" className="hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors flex items-center gap-2"><LucideIcon name="message-circle" size={16}/> Support (+92 3270093063)</a></li>
                        </ul>
                    </div>
                </div>
                <div className="text-center text-slate-400 dark:text-slate-500 text-sm font-medium border-t border-slate-200 dark:border-white/5 pt-8">
                    &copy; 2026 Shop-Scraper AI Inc. All rights reserved. Powered by Hasnain360.
                </div>
            </footer>
        );

        // --- Main App Wrapper ---

        function App() {
            const [user, setUser] = useState(() => {
                try { return JSON.parse(localStorage.getItem('ss_user')); } catch { return null; }
            });
            const [currentRoute, setCurrentRoute] = useState('home');
            const [theme, setTheme] = useState('light');
            const [checkoutTier, setCheckoutTier] = useState(null);

            const handleAuth = (userData) => {
                localStorage.setItem('ss_user', JSON.stringify(userData));
                setUser(userData);
            };

            const handleLogout = () => {
                localStorage.removeItem('ss_user');
                setUser(null);
                setCurrentRoute('home');
            };

            const toggleTheme = () => {
                const newTheme = theme === 'dark' ? 'light' : 'dark';
                setTheme(newTheme);
                if (newTheme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            };

            // Ensure initial class
            useEffect(() => {
                if (theme === 'dark') document.documentElement.classList.add('dark');
            }, []);

            // Scroll to top on route change
            useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [currentRoute]);

            if (!user) {
                return (
                    <div className="min-h-screen flex flex-col font-sans relative">
                        <div className="absolute top-4 right-4 z-50">
                            <button onClick={toggleTheme} className="p-2 rounded-lg text-slate-500 bg-white/50 dark:bg-black/50 backdrop-blur hover:bg-white dark:hover:bg-slate-800 transition-colors shadow-sm">
                                <LucideIcon name={theme === 'dark' ? 'sun' : 'moon'} size={20} />
                            </button>
                        </div>
                        <LoginPage onAuth={handleAuth} />
                        <WhatsAppWidget />
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col font-sans relative">
                    <Navbar currentRoute={currentRoute} setCurrentRoute={setCurrentRoute} theme={theme} toggleTheme={toggleTheme} user={user} onLogout={handleLogout} />
                    
                    <main className="flex-grow pt-20"> 
                        {currentRoute === 'home' && <ScraperTool theme={theme} />}
                        {currentRoute === 'about' && <AboutSection />}
                        {currentRoute === 'pricing' && <PricingSection onCheckout={setCheckoutTier} />}
                        {currentRoute === 'reviews' && <ReviewsSection />}
                        {currentRoute === 'contact' && <ContactSection />}
                    </main>

                    <Footer setCurrentRoute={setCurrentRoute} />
                    <WhatsAppWidget />
                    
                    {/* Modals */}
                    {checkoutTier && <CheckoutModal tier={checkoutTier} onClose={() => setCheckoutTier(null)} onComplete={() => {setCheckoutTier(null); setCurrentRoute('home');}} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
